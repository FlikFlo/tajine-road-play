ин «весь в песке» — а сама хихикает.",rightAction:"Сбить цену и переманить толпу",leftAction:"Молча подать чистый тажин гордо",rightEffect:{dirhams:-25,fame:9},leftEffect:{dirhams:14,fame:-5,chefXP:5},tags:["day","evening"],titleAr:"الخماسين"},{id:"festival_ramadan_iftar_crowd",type:"event",illustration:"",title:"Толпа на ифтар",description:"Солнце вот-вот сядет, у котла очередь голодных постящихся. Накормить всех по-братски — или придержать порции для тех, кто платит больше?",rightAction:"Кормить всех поровну",leftAction:"Сначала за деньги",rightEffect:{dirhams:-25,fame:22,chefXP:6},leftEffect:{dirhams:35,fame:-14},tags:["evening"],titleAr:"إفطار رمضان"},{id:"festival_ramadan_harira_secret",type:"quest",illustration:"",title:"Секрет харри́ры",description:"Бабушка с минарета шепчет: её рецепт рамаданского супа за услугу. Просидеть с ней весь вечер за учёбой — или вежливо сбежать к прилавку?",rightAction:"Учиться до ночи",leftAction:"Отговориться делами",rightEffect:{dirhams:-10,fame:6,chefXP:14},leftEffect:{dirhams:18,fame:-7},tags:["evening"],titleAr:"سر الحريرة"},{id:"festival_eid_fitr_sweets",type:"customer",illustration:"",title:"Сладости на Ид-аль-Фитр",description:"Конец поста! Семья заказывает горы шебакии и макрута к празднику. Раздавать угощение детям квартала даром — или продать всё подчистую?",rightAction:"Угощать детвору",leftAction:"Всё на продажу",rightEffect:{dirhams:-18,fame:20,chefXP:4},leftEffect:{dirhams:45,fame:-12},tags:["morning","day"],titleAr:"حلويات العيد"},{id:"festival_eid_adha_sheep",type:"event",illustration:"",title:"Барашек на Ид-аль-Адха",description:"Праздник жертвоприношения. Сосед зовёт разделать его барана и приготовить мешуи на всю улицу — работа адова, но почёт. Или сослаться на свой котёл?",rightAction:"Встать к огню для всех",leftAction:"Беречь силы и лавку",rightEffect:{dirhams:-15,fame:26,chefXP:10},leftEffect:{dirhams:22,fame:-9},tags:["morning","day"],titleAr:"أضحية العيد"},{id:"festival_moussem_pilgrim_feast",type:"event",illustration:"",title:"Муссем у святого",description:"Паломники стекаются на муссем к гробнице марабута. Накрыть бесплатный стол во имя барака — щедро, но в убыток. Или поставить прилавок у самых ворот?",rightAction:"Стол ради бараки",leftAction:"Прилавок у ворот",rightEffect:{dirhams:-30,fame:28,lootRoll:!0},leftEffect:{dirhams:50,fame:-16},tags:["day"],titleAr:"موسم الزاوية"},{id:"festival_moussem_cookoff_dare",type:"rival",illustration:"",title:"Состязание поваров муссема",description:"На муссеме объявили кук-офф. Хвастливый повар из Феса бросает вызов: чей тажин лучше? Принять пари при всём народе — или гордо промолчать?",rightAction:"Принять вызов",leftAction:"Сберечь репутацию тихо",rightEffect:{luck:{p:.5,success:{dirhams:70,fame:45,lootRoll:!0},fail:{dirhams:-30,fame:-18}}},leftEffect:{dirhams:14,fame:-6},tags:["day"],titleAr:"مباراة الطباخين"},{id:"festival_ashura_water_games",type:"event",illustration:"",title:"Ашура и брызги воды",description:"На Ашуру детвора обливает прохожих водой — традиция. Твой прилавок под угрозой потопа. Втянуться в веселье и угостить шалунов сухофруктами — или прикрыть товар?",rightAction:"Играть с детьми",leftAction:"Спасать товар",rightEffect:{dirhams:-12,fame:16,chefXP:3},leftEffect:{dirhams:20,fame:-8},tags:["day"],titleAr:"زمزم عاشوراء"},{id:"festival_wedding_grand_order",type:"quest",illustration:"",title:"Свадебный пир",description:"Богатая семья гуляет свадьбу семь дней и хочет твои тажины на главный стол. Взяться за изматывающий заказ ради славы — или взять предоплату и не рваться?",rightAction:"Выложиться на пир",leftAction:"Взять задаток, не геройствовать",rightEffect:{dirhams:-20,fame:30,chefXP:12},leftEffect:{dirhams:55,fame:-13},tags:["evening"],titleAr:"وليمة العرس"},{id:"festival_wedding_henna_night",type:"event",illustration:"",title:"Ночь хны",description:"Невесту наряжают, женщины поют до утра. Тебя зовут приготовить угощение на ночь хны — почёт, но спать не придётся. Или прислать готовое и уйти спать?",rightAction:"Остаться до рассвета",leftAction:"Отправить блюда и уйти",rightEffect:{dirhams:-10,fame:24,chefXP:8},leftEffect:{dirhams:28,fame:-10},tags:["evening"],titleAr:"ليلة الحناء"},{id:"festival_circumcision_blessing",type:"customer",illustration:"",title:"Праздник обрезания",description:"Семья празднует обрезание сынишки, гостей полон двор. Просят накрыть стол со скидкой «для соседей». Уступить по-родственному — или держать цену праздника?",rightAction:"Скидка по-соседски",leftAction:"Цена как на празднике",rightEffect:{dirhams:-8,fame:18,lootRoll:!0},leftEffect:{dirhams:40,fame:-11},tags:["day","evening"],titleAr:"حفل الختان"},{id:"festival_olive_harvest_gamble",type:"event",illustration:"",title:"Сбор оливок",description:"Сезон оливок в горах. Фермер зовёт скупить раннее масло прямо с пресса — качество вслепую. Рискнуть деньгами на тёмную бочку или дождаться проверенного на рынке?",rightAction:"Купить вслепую с пресса",leftAction:"Ждать проверенное",rightEffect:{luck:{p:.45,success:{dirhams:90,fame:14,lootRoll:!0},fail:{dirhams:-40,fame:-5}}},leftEffect:{dirhams:16,fame:-5},tags:["morning","day"],titleAr:"جني الزيتون"},{id:"festival_date_harvest_share",type:"quest",illustration:"",title:"Финиковая жатва",description:"Из оазиса привезли первые финики. Караванщик предлагает: помочь раздать дары беднякам квартала во имя урожая — или выкупить лучшую партию для продажи?",rightAction:"Раздать дары квартала",leftAction:"Выкупить лучшее себе",rightEffect:{dirhams:-22,fame:25,chefXP:5},leftEffect:{dirhams:48,fame:-15},tags:["morning"],titleAr:"موسم التمر"},{id:"locals_water_carrier_guerrab",type:"customer",illustration:"",title:"Водонос Герраб",description:"Медные чаши звенят на жаре. «Налей мне миску харбеля, брат, а я весь день буду петь про твою лавку на каждом углу».",rightAction:"Накормить за песню",leftAction:"Деньги вперёд",rightEffect:{dirhams:-8,fame:14,chefXP:3},leftEffect:{dirhams:10,fame:-6},tags:["morning","day"],titleAr:"الڭراب"},{id:"locals_grumpy_auntie_rkia",type:"customer",illustration:"",title:"Ворчливая тётушка Ркия",description:"Тычет пальцем в котёл: «Соли мало, лука много, и вообще раньше готовили лучше». Но из-под платка следит за каждым твоим движением.",rightAction:"Покорно переделать",leftAction:"Стоять на своём",rightEffect:{dirhams:-6,fame:16,chefXP:4},leftEffect:{dirhams:14,fame:-8},tags:["day"],titleAr:"العمة رقية"},{id:"locals_imam_friday",type:"customer",illustration:"",title:"Имам перед пятничной молитвой",description:"«После хутбы у мечети будут сто голодных братьев. Накорми их по-божески, без наживы — и Аллах, и квартал тебя запомнят».",rightAction:"Кормить по-божески",leftAction:"Цена есть цена",rightEffect:{dirhams:-20,fame:28,chefXP:6},leftEffect:{dirhams:35,fame:-14},tags:["day"],titleAr:"الإمام"},{id:"locals_porter_loaded",type:"event",illustration:"",title:"Носильщик под мешками",description:"Сгибается под горой мешков муки, что застряли в твоём переулке. «Подсоби разгрузить, дам пару монет… или половину этой муки, если совесть позволит».",rightAction:"Взять мукой",leftAction:"Взять монетой",rightEffect:{dirhams:-5,fame:10,chefXP:5,lootRoll:!0},leftEffect:{dirhams:18,fame:-5},tags:["morning"],titleAr:"الحمّال"},{id:"locals_kids_marble_bet",type:"event",illustration:"",title:"Дети и спор на шарики",description:"Стайка мальчишек обступила лавку: «Спорим, не угадаешь, в какой руке шарик! Угадаешь — мы притащим тебе всех туристов с площади. Не угадаешь — отдаёшь нам по медовой лепёшке».",rightAction:"Принять спор",leftAction:"Откупиться лепёшкой",rightEffect:{luck:{p:.5,success:{fame:22},fail:{dirhams:-12,fame:-4}}},leftEffect:{dirhams:-5,fame:8},tags:["day"],titleAr:"أطفال الحومة"},{id:"locals_old_neighbor_credit",type:"customer",illustration:"",title:"Старик-сосед без гроша",description:"Дед Брахим вздыхает: пенсию задержали, а тажином пахнет на весь переулок. «Запиши на меня, сынок. Отдам в четверг… наверное».",rightAction:"Записать в долг",leftAction:"Только за наличные",rightEffect:{dirhams:-12,fame:18,chefXP:2},leftEffect:{dirhams:8,fame:-10},tags:["day","evening"],titleAr:"الجار العجوز"},{id:"locals_potter_artisan_swap",type:"customer",illustration:"",title:"Гончар с обожжёнными руками",description:"Ремесленник из соседней мастерской: «Денег после обжига нет до базара. Но вот свежий тажинный горшок — бери в обмен на обед, а?»",rightAction:"Менять на горшок",leftAction:"Настоять на деньгах",rightEffect:{dirhams:-10,fame:9,chefXP:4,lootRoll:!0},leftEffect:{dirhams:16,fame:-7},tags:["morning","day"],titleAr:"الفخّار"},{id:"locals_busy_mother_brood",type:"customer",illustration:"",title:"Многодетная мать с выводком",description:"Семеро вокруг подола, у самой две монеты в кулаке. «Накорми всех, на что хватит. Знаю, что мало… но дети второй день на хлебе с маслом».",rightAction:"Накормить всех досыта",leftAction:"Ровно на две монеты",rightEffect:{dirhams:-15,fame:24,chefXP:5},leftEffect:{dirhams:5,fame:-9},tags:["day"],titleAr:"أم العيال"},{id:"locals_henna_lady_evening",type:"event",illustration:"",title:"Тётушки за хной",description:"Соседки собрались на вечер хны и зовут тебя: «Принеси сладкого кускуса на угощение — даром, по-соседски. Зато весь женский квартал будет знать твоё имя».",rightAction:"Угостить даром",leftAction:"Продать им порцию",rightEffect:{dirhams:-14,fame:22,chefXP:3},leftEffect:{dirhams:22,fame:-8},tags:["evening"],titleAr:"ليلة الحنّاء"},{id:"locals_blind_elder_taste",type:"customer",illustration:"",title:"Слепой старец-дегустатор",description:"Говорят, он по запаху отличит шафран от куркумы за три шага. «Дай попробовать ложку бесплатно — и я скажу всей медине, чего стоит твой котёл. Если он того стоит».",rightAction:"Дать ложку на суд",leftAction:"Вежливо отказать",rightEffect:{luck:{p:.55,success:{fame:26,lootRoll:!0},fail:{fame:-16}}},leftEffect:{dirhams:6,fame:-4},tags:["day","evening"],titleAr:"الذوّاق"},{id:"locals_blacksmith_hot_order",type:"customer",illustration:"",title:"Кузнец у горна",description:"Чёрный от сажи, голодный как печь: «Накорми погуще — наточу твой тесак до бритвы в придачу. Или плати как все, мне без разницы».",rightAction:"Кормить за заточку",leftAction:"Брать деньгами",rightEffect:{dirhams:-7,fame:8,chefXP:6,lootRoll:!0},leftEffect:{dirhams:20,fame:-6},tags:["morning","day"],titleAr:"الحدّاد"},{id:"locals_night_watchman_round",type:"event",illustration:"",title:"Ночной сторож на обходе",description:"Закутанный в джеллабу старик стучит палкой по плитам. «Налей горячего на ночь — буду присматривать за твоей лавкой до зари. Не нальёшь — ну, сам сторожи».",rightAction:"Налить за дозор",leftAction:"Прогнать спать",rightEffect:{dirhams:-6,fame:12,chefXP:2},leftEffect:{dirhams:12,fame:-7},tags:["evening"],titleAr:"العسّاس"},{id:"tourists_lost_germans",type:"event",illustration:"",title:"Заблудившиеся немцы",description:"Пара с огромным рюкзаком тычет в карту вверх ногами: «Рияд Аль-Андалус? Зеллидж-отель?» Совсем потерялись в переулках медины.",rightAction:"Проводить лично",leftAction:"Махнуть рукой «туда»",rightEffect:{dirhams:-8,fame:16,chefXP:4},leftEffect:{dirhams:6,fame:-5},tags:["day"],titleAr:"السياح الضائعون"},{id:"tourists_food_blogger",type:"customer",illustration:"",title:"Фуд-блогер с кольцевой лампой",description:"Ставит штатив прямо в проходе, светит лампой в котёл: «Снимем рилс? Бесплатная порция — и я тебя отмечу, брат».",rightAction:"Накормить за рилс",leftAction:"Тут не студия",rightEffect:{dirhams:-15,luck:{p:.4,success:{fame:55},fail:{fame:-6}}},leftEffect:{dirhams:14,fame:-6},tags:["day"],titleAr:"مدوّن الطعام"},{id:"tourists_travel_journalist",type:"customer",illustration:"",title:"Тревел-журналист с диктофоном",description:"«Колонка о скрытых жемчужинах Магриба. Дашь интервью — но честно, без прикрас». Диктофон уже мигает красным.",rightAction:"Открыться начистоту",leftAction:"Беречь рецепты",rightEffect:{dirhams:-10,fame:22,chefXP:6},leftEffect:{dirhams:12,fame:-8},tags:["evening"],titleAr:"صحفي السفر"},{id:"tourists_film_crew",type:"quest",illustration:"",title:"Киногруппа из Касабланки",description:"«Снимаем сериал про медину! Перекрываем твой угол на полдня. Платим за простой — но торговли сегодня не будет».",rightAction:"Сдать угол в кадр",leftAction:"Работа важнее кино",rightEffect:{dirhams:45,fame:-12},leftEffect:{dirhams:-6,fame:18,chefXP:5},tags:["morning","day"],titleAr:"فريق التصوير"},{id:"tourists_gourmet_critic",type:"rival",illustration:"",title:"Гурман-критик инкогнито",description:"Тихий господин в льняном пиджаке пробует ложку, делает заметку в блокнот. Знакомые шепчут: это тот самый критик с тремя «тажинами».",rightAction:"Подать парадный тажин",leftAction:"Кормить как всех",rightEffect:{dirhams:-20,luck:{p:.5,success:{fame:60},fail:{fame:-20}}},leftEffect:{dirhams:10,fame:-7},tags:["evening"],titleAr:"ناقد الطعام"},{id:"tourists_influencer_squad",type:"event",illustration:"",title:"Стайка инфлюенсеров",description:"Шестеро в одинаковых соломенных шляпах хотят «эстетичный флэтлей». Заказывают одну порцию на всех — зато фоткать будут час.",rightAction:"Устроить фотозону",leftAction:"Один кадр — и хватит",rightEffect:{dirhams:-12,fame:20,chefXP:3},leftEffect:{dirhams:8,fame:-5},tags:["day"],titleAr:"المؤثرون"},{id:"tourists_pushy_guide",type:"rival",illustration:"",title:"Гид с откатом",description:"«Приведу к тебе автобус японцев — но половину выручки мне в карман. Откажешься — поведу их к Зоре».",rightAction:"Согласиться на откат",leftAction:"Без посредников",rightEffect:{dirhams:40,fame:-14},leftEffect:{dirhams:-10,fame:15,chefXP:4},tags:["morning","day"],titleAr:"المرشد السياحي"},{id:"tourists_haggling_couple",type:"customer",illustration:"",title:"Туристы, которые торгуются",description:"«В путеводителе написано торговаться до последнего!» Сбивают цену на тажин с таким азартом, будто это ковёр за тысячу дирхамов.",rightAction:"Уступить с улыбкой",leftAction:"Цена есть цена",rightEffect:{dirhams:-7,fame:12,chefXP:3},leftEffect:{dirhams:22,fame:-9},tags:["day"],titleAr:"السائحان المساومان"},{id:"tourists_selfie_disaster",type:"event",illustration:"",title:"Сэлфи у самого котла",description:"Турист пятится для эффектного кадра — прямо на твой стол со специями. Ещё шаг, и шафран полетит в пыль.",rightAction:"Поймать, спасти шафран",leftAction:"Снять провал на видео",rightEffect:{dirhams:-5,fame:14,chefXP:5},leftEffect:{fame:-4,luck:{p:.45,success:{fame:40},fail:{fame:-10}}},tags:["day","evening"],titleAr:"صورة شخصية"},{id:"tourists_drone_filmer",type:"quest",illustration:"",title:"Турист с дроном",description:"Жужжащий дрон кружит над мединой для «эпичных кадров». Хочет панораму твоей лавки сверху — но местные косятся на гудящую игрушку.",rightAction:"Позировать для дрона",leftAction:"Уважить покой улицы",rightEffect:{dirhams:-6,fame:17,chefXP:2},leftEffect:{dirhams:9,fame:-5},tags:["morning","day"],titleAr:"طائرة بدون طيار"},{id:"tourists_homesick_backpacker",type:"customer",illustration:"",title:"Тоскующий по дому бэкпекер",description:"Девушка месяц в пути, скучает по маминой еде. Просит не острое, «что-нибудь тёплое и простое». Заплатит немного — но искренне.",rightAction:"Сготовить с душой",leftAction:"Подать ходовое блюдо",rightEffect:{dirhams:-6,fame:13,chefXP:6},leftEffect:{dirhams:16,fame:-6},tags:["evening"],titleAr:"الرحالة الحنين"},{id:"tourists_viral_challenge",type:"rival",illustration:"",title:"Острый челлендж на камеру",description:"Толпа тиктокеров требует «самый адский тажин в Магрибе» для вирусного видоса. Слух разлетится — вопрос лишь, в какую сторону.",rightAction:"Принять огненный вызов",leftAction:"Не клоун у плиты",rightEffect:{dirhams:-10,luck:{p:.5,success:{dirhams:30,fame:50,lootRoll:!0},fail:{fame:-25}}},leftEffect:{dirhams:12,fame:-7},tags:["evening"],titleAr:"تحدي حار"},{id:"officials_saninspektor_vizit",type:"rival",illustration:"",title:"Санинспектор у котла",description:"Инспектор в белых перчатках водит пальцем по краю казана и хмурится: «Жирок, а? Покажешь кухню — или договоримся по-тихому?»",rightAction:"Открыть кухню",leftAction:"Сунуть пару монет",rightEffect:{dirhams:-15,fame:14,chefXP:6},leftEffect:{dirhams:-35,fame:-10},tags:["morning","day"],titleAr:"مفتش الصحة"},{id:"officials_nalogovik_perepis",type:"rival",illustration:"",title:"Налоговик с тетрадкой",description:"Худой человек слюнявит карандаш: «Выручка у тебя, говорят, хорошая. Запишем как есть — или как тебе удобнее?»",rightAction:"Честно записать всё",leftAction:"Занизить цифры",rightEffect:{dirhams:-30,fame:18},leftEffect:{dirhams:22,fame:-16},tags:["day","evening"],titleAr:"جابي الضرائب"},{id:"officials_strazha_mzda",type:"rival",illustration:"",title:"Городская стража",description:"Двое в форме привалились к навесу: «Спокойный квартал, да? Покорми нас — и спать будешь спокойно». Намёк прозрачнее бульона.",rightAction:"Накормить даром",leftAction:"Вежливо отказать",rightEffect:{dirhams:-18,fame:12,chefXP:4},leftEffect:{dirhams:-10,fame:8},tags:["evening"],titleAr:"حرس المدينة"},{id:"officials_pasha_pir",type:"customer",illustration:"",title:"Пир у паши",description:"Слуга в шёлке: «Паша устраивает приём и слышал о твоём тажине. Готов накормить весь двор — но цену назовёт сам паша».",rightAction:"Принять заказ паши",leftAction:"Сослаться на занятость",rightEffect:{dirhams:-20,fame:28,chefXP:10},leftEffect:{dirhams:14,fame:-12},tags:["evening"],titleAr:"وليمة الباشا"},{id:"officials_litsenziya_provrka",type:"rival",illustration:"",title:"Проверка лицензии",description:"Чиновник разворачивает бумаги: «Разрешение на торговлю просрочено на месяц. Оформим по правилам — или ускорим за отдельную благодарность?»",rightAction:"Оформить по правилам",leftAction:"Доплатить за скорость",rightEffect:{dirhams:-25,fame:16,chefXP:3},leftEffect:{dirhams:-45,fame:-8},tags:["morning"],titleAr:"رخصة البيع"},{id:"officials_vzyatka_chinovnik",type:"rival",illustration:"",title:"Чиновник за взяткой",description:"Пухлый писарь подмигивает: «Местечко на главной площади освободилось. Конвертик — и оно твоё. Или жди очереди три года».",rightAction:"Дать конвертик",leftAction:"Встать в честную очередь",rightEffect:{dirhams:40,fame:-20},leftEffect:{dirhams:-12,fame:14},tags:["day"],titleAr:"موظف فاسد"},{id:"officials_perepis_naseleniya",type:"event",illustration:"",title:"Городская перепись",description:"Переписчики обходят медину. «Сколько в семье, сколько работников, сколько лавок?» За точные ответы — пометка «образцовый торговец».",rightAction:"Ответить подробно",leftAction:"Отвертеться побыстрее",rightEffect:{dirhams:-8,fame:16,chefXP:5},leftEffect:{dirhams:10,fame:-9},tags:["morning","day"],titleAr:"إحصاء المدينة"},{id:"officials_shtraf_dym",type:"rival",illustration:"",title:"Штраф за дым",description:"Инспектор машет рукой перед лицом: «Угли коптят на всю улицу, соседи жалуются! Штраф — или поставишь хороший вытяжной навес?»",rightAction:"Поставить навес",leftAction:"Поспорить и рискнуть",rightEffect:{dirhams:-28,fame:12,chefXP:4},leftEffect:{luck:{p:.45,success:{fame:18},fail:{dirhams:-60,fame:-10}}},tags:["day","evening"],titleAr:"غرامة الدخان"},{id:"officials_pasha_doch",type:"quest",illustration:"",title:"Каприз дочери паши",description:"Капризная девушка тычет веером: «Хочу тажин с настоящим золотым шафраном, прямо сейчас. Папа щедр к тем, кто угодит».",rightAction:"Расстараться для неё",leftAction:"Подать что попроще",rightEffect:{dirhams:-22,fame:24,chefXP:8},leftEffect:{dirhams:18,fame:-14},tags:["day","evening"],titleAr:"ابنة الباشا"},{id:"officials_strazha_oblava",type:"event",illustration:"",title:"Облава на контрабанду",description:"Стража прочёсывает ряды: ищут краденый шафран. «Твои специи откуда? Покажи накладные — или придётся всё описать до выяснения».",rightAction:"Показать накладные",leftAction:"Замять по-тихому",rightEffect:{dirhams:-10,fame:18,chefXP:3},leftEffect:{dirhams:-32,fame:-12},tags:["morning"],titleAr:"مداهمة الحرس"},{id:"officials_pisar_donos",type:"rival",illustration:"",title:"Писарь с доносом",description:"Сосед нашептал писарю, что ты торгуешь без меры. Тот шуршит вщик Дрисс",description:"«Нужны дирхамы на завоз? Дам сейчас, отдашь… потом». Улыбка у него слишком ровная.",rightAction:"Взять ссуду",leftAction:"Обойтись своими",rightEffect:{dirhams:50,fame:-12},leftEffect:{dirhams:-10,fame:8,chefXP:2},tags:["day","evening"],titleAr:"المرابي إدريس"},{id:"traders_meat_bulk",type:"customer",illustration:"",title:"Оптом у мясника",description:"Карим валит на прилавок целого барана. «Возьмёшь всё — скину треть. Возьмёшь кусок — плати как турист».",rightAction:"Брать всю тушу",leftAction:"Только вырезку",rightEffect:{dirhams:-45,fame:7,chefXP:6},leftEffect:{dirhams:22,fame:-6},tags:["morning"],titleAr:"اللحم بالجملة"},{id:"traders_barter_pots",type:"customer",illustration:"",title:"Бартер с гончаром",description:"Гончар без гроша, зато с тележкой тажинов. «Накормишь меня неделю — забирай посуду». Деньги или горшки?",rightAction:"Обмен на еду",leftAction:"Только за деньги",rightEffect:{dirhams:-20,fame:9,lootRoll:!0},leftEffect:{dirhams:28,fame:-7},tags:["day"],titleAr:"مقايضة الفخار"},{id:"traders_saffron_auction",type:"rival",illustration:"",title:"Торг за шафран с Зорой",description:"Последний мешок тилуитского шафрана, и Зора тянет руку к нему. Перебьёшь цену или уступишь с достоинством?",rightAction:"Перебить цену",leftAction:"Уступить красиво",rightEffect:{dirhams:-50,fame:6,lootRoll:!0},leftEffect:{dirhams:15,fame:-8},tags:["day"],titleAr:"مزاد الزعفران"},{id:"traders_olive_wholesale",type:"event",illustration:"",title:"Оптовая бочка оливок",description:"Фермер скинул цену за всю бочку разом. Места мало, оливки потекут — но цена смешная.",rightAction:"Брать всю бочку",leftAction:"Перепродать половину",rightEffect:{dirhams:-35,fame:6,chefXP:5},leftEffect:{dirhams:30,fame:-9},tags:["morning","day"],titleAr:"برميل الزيتون"},{id:"traders_carpet_swap",type:"customer",illustration:"",title:"Сделка на ковёр",description:"Бербер хочет старый ковёр твоей бабушки в обмен на редкие специи Атласа. Память или приправы?",rightAction:"Обменять :{dirhams:30,fame:-10},tags:["day","morning"],titleAr:"حرب الأسعار"},{id:"rivals_spy_notebook",type:"rival",illustration:"",title:"Шпион с блокнотом",description:"Парень час срисовывает твои специи в потёртый блокнот. Явно человек Зоры.",rightAction:"Выпроводить вон",leftAction:"Подсунуть фальшивый рецепт",rightEffect:{dirhams:-8,fame:10},leftEffect:{fame:-6,luck:{p:.5,success:{dirhams:40,fame:18},fail:{dirhams:-15,fame:-8}}},tags:["day","evening"]},{id:"rivals_poach_regular",type:"rival",illustration:"",title:"Переманенный завсегдатай",description:"Старый Идрис, что ел у тебя годами, теперь топчется у лотка Зоры. Она шепнула ему скидку.",rightAction:"Вернуть угощением",leftAction:"Гордо махнуть рукой",rightEffect:{dirhams:-18,fame:12,chefXP:3},leftEffect:{dirhams:10,fame:-9},tags:["day"]},{id:"rivals_pot_sabotage",type:"rival",illustration:"",title:"Соль в котле",description:"Кто-то от души посолил твой бульон ночью. Подавать как есть или варить заново впопыхах?",rightAction:"Сварить заново (−время, −деньги)",leftAction:"Развести и подать",rightEffect:{dirhams:-22,fame:15,chefXP:5},leftEffect:{dirhams:18,fame:-14},tags:["morning","day"],titleAr:"تخريب القدر"},{id:"rivals_slander_market",type:"rival",illustration:"",title:"Клевета на базаре",description:"По рядам пополз слух: «У него мясо несвежее». Уши Зоры торчат отовсюду.",rightAction:"Угостить весь ряд даром",leftAction:"Накричать на сплетников",rightEffect:{dirhams:-30,fame:22,lootRoll:!0},leftEffect:{dirhams:12,fame:-16},tags:["day"],titleAr:"الافتراء"},{id:"rivals_recipe_theft",type:"rival",illustration:"",title:"Кража рецепта",description:"Зора выставила «свой» тажин — один в один твой фирменный. Тетрадь деда пропала на той неделе.",rightAction:"Изобрести блюдо круче",leftAction:"Подать на неё кади (судье)",rightEffect:{dirhams:-20,fame:18,chefXP:8},leftEffect:{fame:-5,luck:{p:.45,success:{dirhams:70,fame:25},fail:{dirhams:-40,fame:-12}}},tags:["evening"],titleAr:"سرقة الوصفة"},{id:"rivals_bribe_inspector",t
